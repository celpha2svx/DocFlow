name: docflow_app
description: DocFlow - Clinical calculation tool for Nigerian doctors.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  share_plus: ^7.2.1
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  crypto: ^3.0.3
  firebase_core: ^2.24.2
  cloud_firestore: ^4.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  sqflite_common_ffi: ^2.3.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/