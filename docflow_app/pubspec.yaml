name: docflow_app
description: DocFlow - Clinical calculations for Nigerian clinicians, medical students & nurses.
publish_to: 'none'
version: 1.1.1+1

environment:
  sdk: '>=3.12.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  share_plus: ^13.1.0
  uuid: ^4.3.3
  connectivity_plus: ^7.1.1
  http: ^1.2.0
  crypto: ^3.0.3
  firebase_core: ^2.24.2
  cloud_firestore: ^4.15.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  sqflite_common_ffi: ^2.3.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/calculators.json
