name: DocFlow CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'
      - run: flutter pub get
        working-directory: docflow_app
      - name: Create GitHub config
        run: |
          cat > docflow_app/lib/services/github_config.dart << 'EOF'
          class GitHubConfig {
            GitHubConfig._();
            static const String token = '${{ secrets.GITHUB_TOKEN_ISSUES }}';
            static const String repoOwner = 'celpha2svx';
            static const String repoName = 'DocFlow';
          }
          EOF
      - run: flutter test
        working-directory: docflow_app

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'
      - run: flutter pub get
        working-directory: docflow_app
      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore docflow-release.jks \
            -alias docflow \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass docflow-release \
            -keypass docflow-release \
            -dname "CN=DocFlow, OU=CI, O=DocFlow, L=Lagos, ST=Lagos, C=NG"
        working-directory: docflow_app/android
      - run: flutter build apk --release
        env:
          STORE_FILE: docflow-release.jks
          STORE_PASSWORD: docflow-release
          KEY_ALIAS: docflow
          KEY_PASSWORD: docflow-release
        working-directory: docflow_app
      - uses: actions/upload-artifact@v4
        with:
          name: docflow-apk-${{ github.sha }}
          path: docflow_app/build/app/outputs/flutter-apk/app-release.apk
