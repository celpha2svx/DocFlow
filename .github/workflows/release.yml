name: Auto Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'
      - run: flutter pub get
        working-directory: docflow_app

      - name: Decode keystore from secrets, or generate one for first run
        working-directory: docflow_app/android
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > docflow-release.jks
            echo "Keystore loaded from GitHub secret — in-place upgrades will work."
          else
            echo "::warning::KEYSTORE_BASE64 not set — generating a new one-time keystore."
            echo "::warning::After this build completes, copy the keystore value from the next step"
            echo "::warning::into GitHub Secrets as KEYSTORE_BASE64 so future builds can use it."
            keytool -genkey -v \
              -keystore docflow-release.jks \
              -alias docflow \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass docflow-release \
              -keypass docflow-release \
              -dname "CN=DocFlow, OU=CI, O=DocFlow, L=Lagos, ST=Lagos, C=NG"
          fi

      - name: Print keystore for first-time setup
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          echo "=========================================="
          echo "FIRST-TIME SETUP — Copy the value below"
          echo "=========================================="
          echo "GitHub repo → Settings → Secrets → Actions → New secret"
          echo "Name:  KEYSTORE_BASE64"
          echo "Name:  KEYSTORE_PASSWORD   (value: docflow-release)"
          echo ""
          echo "Base64 keystore value:"
          echo ""
          base64 -w 0 docflow-release.jks
          echo ""
          echo ""
          echo "=========================================="

      - name: Build release APK
        working-directory: docflow_app
        run: flutter build apk --release
        env:
          STORE_FILE: ../android/docflow-release.jks
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'docflow-release' }}
          KEY_ALIAS: docflow
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'docflow-release' }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DocFlow ${{ github.ref_name }}
          body: |
            Download the APK below to install on your Android device.

            **Upgrading from a previous version?** Just install — same signing key, no uninstall needed.
          files: docflow_app/build/app/outputs/flutter-apk/app-release.apk