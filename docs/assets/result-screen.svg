<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 540" fill="none">
  <rect x="10" y="0" width="260" height="530" rx="30" fill="#2E75B6" stroke="#1A3A5C" stroke-width="2"/>
  <rect x="25" y="15" width="230" height="500" rx="20" fill="#F8FAFC"/>
  <!-- Status bar -->
  <rect x="25" y="15" width="230" height="30" rx="20" fill="#2E75B6"/>
  <text x="45" y="35" font-family="system-ui" font-size="11" fill="white">9:41</text>
  <rect x="110" y="2" width="60" height="16" rx="8" fill="#1A3A5C"/>
  <!-- App bar -->
  <rect x="25" y="45" width="230" height="44" fill="#2E75B6"/>
  <text x="140" y="72" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="white">BMI Calculator</text>
  <!-- Result card -->
  <rect x="40" y="105" width="200" height="140" rx="14" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>
  <text x="140" y="155" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="800" fill="#1F4E79">24.5</text>
  <text x="186" y="155" font-family="system-ui" font-size="14" fill="#6B7280">kg/m²</text>
  <rect x="110" y="172" width="60" height="24" rx="12" fill="#16A34A" opacity="0.1" stroke="#16A34A" stroke-width="1"/>
  <text x="140" y="188" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#16A34A">Normal</text>
  <text x="50" y="218" font-family="system-ui" font-size="11" fill="#6B7280" line-height="1.4">BMI calculated from weight and height.</text>

  <!-- Formula transparency -->
  <rect x="40" y="260" width="200" height="70" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="55" y="282" font-family="system-ui" font-size="11" font-weight="600" fill="#1F4E79">Formula Transparency</text>
  <rect x="50" y="292" width="180" height="28" rx="6" fill="#F8FAFC" stroke="#1F4E79" stroke-dasharray="4" stroke-width="1"/>
  <text x="58" y="311" font-family="monospace" font-size="10" fill="#1A1A2E">BMI = 75 / (1.75)² = 24.5</text>

  <!-- Save buttons -->
  <rect x="40" y="350" width="200" height="38" rx="10" fill="white" stroke="#1F4E79" stroke-width="1.5"/>
  <text x="140" y="374" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1F4E79">Save to New Patient</text>

  <rect x="40" y="398" width="200" height="38" rx="10" fill="white" stroke="#1F4E79" stroke-width="1.5"/>
  <text x="140" y="422" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1F4E79">Save to Existing Patient</text>

  <rect x="40" y="446" width="200" height="38" rx="10" fill="#1F4E79"/>
  <text x="140" y="470" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="white">Share Result</text>

  <!-- Bottom nav -->
  <rect x="25" y="465" width="230" height="50" rx="0" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="95" y="497" font-family="system-ui" font-size="10" fill="#1F4E79" font-weight="600">← Back</text>
</svg>